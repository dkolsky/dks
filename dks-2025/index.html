<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Scroll Sketch</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        overflow-y: scroll;
        height: 300vh; /* allows scrolling */
      }
      canvas {
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        z-index: -1; /* keep it behind other stuff if needed */
      }
    </style>
    
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
    <script src="sketch.js"></script>
  </body>
</html>
